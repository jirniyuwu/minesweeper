<!DOCTYPE html>
<html>
    <head>
        <title>minesweeper - editor</title>
        <icon></icon>
        <script src="editor.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="icon.png">
    </head>
    <body>
        <div id="debug"></div>
        <div id="board">
            <div id="inputbox">
                <div class="button_selector">
                    <input type="radio" id="blank_button" name="button_select" value="blank" checked>
                    <input type="radio" id="locked_button" name="button_select" value="locked">
                    <input type="radio" id="wall_button" name="button_select" value="wall">
                </div>
                <input type="number" class="textbox rowsinput" id="rowinput" placeholder="row" value="8">
                <input type="number" class="textbox columnsinput" id="columninput" placeholder="column" value="8">  
                <button id="button_reset" onclick="resetField()"></button>
                <button id="button_play" onclick="exportAndPlay()"></button>
                <button id="button_export" onclick="exportButton(true)">
                    <div class="text_export">copied to clipboard</div>
                </button>     
            </div>
            <div id="field"></div>
        </div>
    </body>
</html>
